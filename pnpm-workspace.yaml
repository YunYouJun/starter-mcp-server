catalogMode: prefer

ignoreWorkspaceRootCheck: true

onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks

overrides:
  chokidar: ^5

shellEmulator: true

trustPolicy: no-downgrade

packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalog:
  '@types/yargs': ^17.0.35
  yargs: ^18.0.0

catalogs:
  cli:
    '@antfu/eslint-config': ^6.7.3
    '@antfu/ni': ^28.3.0
    '@modelcontextprotocol/sdk': ^1.27.1
    bumpp: ^10.4.1
    eslint: ^9.39.4
    lint-staged: ^16.3.3
    simple-git-hooks: ^2.13.1
    tsdown: ^0.21.1
    tsx: ^4.21.0
    typescript: ^5.9.3
    vite: ^7.3.1
    zod: ^3.25.76
  inlined:
    '@antfu/utils': ^9.3.0
  testing:
    tinyexec: ^1.0.2
    vitest: ^4.0.18
    vitest-package-exports: ^1.2.0
    yaml: ^2.8.2
  types:
    '@types/node': ^25.4.0
